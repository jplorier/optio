{{- include "optio.validateNetworking" . }}
{{- if and .Values.gatewayAPI.enabled (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-httproute
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "optio.labels" . | nindent 4 }}
  {{- with .Values.gatewayAPI.httpRouteAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.gatewayAPI.parentRefs }}
    {{- toYaml .Values.gatewayAPI.parentRefs | nindent 4 }}
    {{- else }}
    - name: {{ .Release.Name }}-gateway
      namespace: {{ .Values.namespace }}
    {{- end }}
  {{- if .Values.gatewayAPI.hostname }}
  hostnames:
    - {{ .Values.gatewayAPI.hostname | quote }}
  {{- end }}
  rules:
    # Block /api/internal/* from public traffic — these endpoints use bearer
    # token auth (not session auth) and must only be reachable within the cluster.
    # Pods access them via the K8s service DNS, which bypasses the gateway.
    # Per the Gateway API spec, a rule with no backendRefs returns 404.
    - matches:
        - path:
            type: PathPrefix
            value: /api/internal/
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /ws
      backendRefs:
        - name: {{ .Release.Name }}-api
          port: {{ .Values.api.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-web
          port: {{ .Values.web.port }}
{{- end }}
